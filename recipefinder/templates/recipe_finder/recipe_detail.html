<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>{{ recipe.name }} · Конструктор рецептов</title>
  {% load static %}
  <link rel="icon" type="image/png" href="/static/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="shortcut icon" href="/static/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Рецепты" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: url('{% static "background.png" %}') repeat top left fixed; background-size: auto; }
    .container { max-width: 900px; margin: 0 auto; padding: 18px; background: rgba(250, 250, 250, 0.9); border-radius: 8px; margin-top: 18px; margin-bottom: 18px; }
    a { color: #2176ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { margin-bottom: 18px; }
    h1 { margin: 0 0 6px; }
    .meta { font-size: 0.95rem; color: #555; margin-bottom: 16px; }
    .ingredients { list-style: none; padding-left: 0; margin: 0 0 16px 0; }
    .ingredients li { padding: 6px 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 6px; }
    .section { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    img.recipe-img { max-width: 100%; border-radius: 10px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="{% url 'home' %}">&larr; Назад к поиску</a>
      <h1>{{ recipe.name }}</h1>
    </header>

    {% if recipe.picture %}
      <img class="recipe-img" src="{{ recipe.picture.url }}" alt="{{ recipe.name }}" />
    {% endif %}

    <div class="meta">Ингредиенты: {{ recipe.ingredients.all|join:", " }}</div>

    <div class="section">
      <h2>Описание</h2>
      <p>{{ recipe.description|linebreaksbr }}</p>
    </div>

    <div class="section">
      <h2>Инструкция</h2>
      <p>{{ recipe.instructions|linebreaksbr }}</p>
    </div>
  </div>
</body>
</html>
